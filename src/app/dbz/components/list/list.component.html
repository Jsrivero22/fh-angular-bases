<h4>Listado</h4>

<ul *ngIf="characterList.length; else noCharacters"
    class="list-group">

    <li *ngFor="
            let character of characterList;
            let i = index;
            let isFirst = first;
            let isLast = last;
            let isEven = even;
            let isOdd = odd;
        "
        class="list-group-item d-flex justify-content-between align-items-center"
        [ngClass]="{
            'list-group-item-dark': isLast,
            'list-group-item-primary': isEven
        }"
    >
        <div class="">

            <span class="text-primary"> {{ i + 1 }}. </span>

            <span>{{ character.name }} - </span>

            <strong>Power: </strong>

            <span>{{ character.power }}</span>

            <!-- <span>Es el primero: {{ isFirst }} </span>
            <span>Es el ultimo: {{ isLast }}</span>
            <span>Es par: {{ isEven }} </span>
            <span>Es impar: {{ isOdd }}</span> -->

        </div>

        <button class="btn btn-danger btn-sm" (click)="onDeletedCharacterById( character.id! )">X</button>

    </li>
</ul>


<ng-template #noCharacters>
    <h3>No hay personajes</h3>
</ng-template>
