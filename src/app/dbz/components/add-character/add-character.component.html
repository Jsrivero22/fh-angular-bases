<h4>Agregar Personajes</h4>
<form (ngSubmit)="emitCharacter()">

    <div class="form-group">
        <label for="nombre">Nombre</label>
        <input
            type="text"
            class="form-control"
            name="name"
            placeholder="Name"
            [(ngModel)]="character.name"
        >
    </div>

    <div class="form-group">
        <label for="poder">Poder</label>
        <input
            type="number"
            class="form-control"
            name="power"
            placeholder="Power"
            [(ngModel)]="character.power"
        >
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary mt-2 btn-block" >
            Agregar
        </button>
    </div>

    <!-- <pre>{{ character | json }}</pre> -->

</form>
