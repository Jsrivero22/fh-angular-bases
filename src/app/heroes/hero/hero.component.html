<h1>{{ name }}</h1>

<dl>
    <td>Name:</td>
    <dd> {{ name }} </dd>

    <td>Edad:</td>
    <dd> {{ age }} </dd>

    <td>Metodo:</td>
    <dd> {{ getHeroDescription() }} </dd>

    <td>Capitalizado:</td>
    <dd> {{ capitalizedName }} </dd>

</dl>

<div class="d-flex gap-4">

    <button
        class="btn btn-success"
        (click)="changeHero('Spiderman')"
        *ngIf="name !== 'Spiderman'"
    >
        Cambiar Nombre
    </button>

    <button
        class="btn btn-primary"
        (click)="changeAge( 40 )"
        *ngIf="age !== 40"
    >
        Cambiar Edad
    </button>

    <button
        class="btn btn-danger"
        (click)="resetForm()"
    >
        Reset Form
    </button>

</div>
